<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zephyr // ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" crossorigin src="/assets/index-C2sPqaq1.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DBYb_mYx.css">
</head>
<body class="bg-white text-slate-900">
<header class="h-24 px-12 border-b border-slate-50 sticky top-0 bg-white/90 backdrop-blur-xl z-[100] flex items-center justify-between">
    <div class="flex items-center gap-4">
        <img src="/assets/zephyrlogo-BEXylkiZ.png" class="w-10 h-10" onerror="this.style.display='none'">
        <div class="flex flex-col">
            <h1 class="text-xl font-black uppercase leading-none">Zephyr<span class="text-blue-500">.Engine</span></h1>
            <span class="text-[8px] font-bold text-slate-300 tracking-[3px] uppercase mt-1">Status: Operational</span>
        </div>
    </div>
    <div class="flex items-center gap-6">
        <div class="flex gap-1 bg-slate-50 p-1.5 rounded-2xl overflow-x-auto max-w-[500px]">
            <button class="nav-tab bg-black text-white text-[10px] font-black uppercase px-4 py-2 rounded-xl transition-all whitespace-nowrap" data-type="mod">Mods</button>
            <button class="nav-tab text-[10px] font-black uppercase px-4 py-2 rounded-xl transition-all whitespace-nowrap" data-type="plugin">Plugins</button>
            <button class="nav-tab text-[10px] font-black uppercase px-4 py-2 rounded-xl transition-all whitespace-nowrap" data-type="shader">Shaders</button>
            <button class="nav-tab text-[10px] font-black uppercase px-4 py-2 rounded-xl transition-all whitespace-nowrap" data-type="datapack">Data Packs</button>
            <button class="nav-tab text-[10px] font-black uppercase px-4 py-2 rounded-xl transition-all whitespace-nowrap" data-type="modpack">Modpacks</button>
        </div>
        <input type="text" id="global-search" class="bg-slate-50 border border-slate-100 px-6 py-3 rounded-2xl outline-none w-80 font-semibold text-sm focus:ring-4 focus:ring-blue-50 transition-all" placeholder="Search SkyWind Assets...">
    </div>
</header>
<div class="max-w-[1800px] mx-auto flex">
    <aside class="w-80 p-8 border-r border-slate-50 h-[calc(100vh-96px)] sticky top-24 overflow-y-auto">
        <div id="filter-container"></div>
    </aside>
    <main class="flex-1 p-12">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <select id="sort-select" class="font-bold text-[10px] uppercase outline-none bg-transparent cursor-pointer tracking-widest text-slate-400" onchange="fetchData()">
                    <option value="relevance">Relevance</option>
                    <option value="downloads">Most Downloaded</option>
                    <option value="follows">Most Followed</option>
                    <option value="newest">Newest</option>
                    <option value="updated">Recently Updated</option>
                </select>
                <div class="text-[10px] font-black opacity-30 uppercase tracking-widest"><span id="total-results">0</span> Assets Synced</div>
            </div>
            <div class="flex items-center gap-4">
                <button id="prev-page" onclick="navPage(-1)" class="text-[10px] font-black uppercase px-4 py-2 border border-slate-100 rounded-xl disabled:opacity-20 transition-all">Previous</button>
                <span id="page-info" class="text-[10px] font-black uppercase opacity-40">Page 1</span>
                <button id="next-page" onclick="navPage(1)" class="text-[10px] font-black uppercase px-4 py-2 border border-slate-100 rounded-xl disabled:opacity-20 transition-all">Next</button>
            </div>
        </div>
        <div id="mod-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10"></div>
    </main>
</div>
<div id="detail-panel" class="fixed inset-0 bg-white z-[2000] hidden overflow-y-auto">
    <div id="detail-body"></div>
</div>
</body>
</html>
